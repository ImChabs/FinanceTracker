name: Android CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  compile:
    name: Compile Debug
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure scripts are executable
        run: chmod +x gradlew scripts/validate-compile.sh scripts/validate-unit-tests.sh

      - name: Assemble debug app
        run: bash scripts/validate-compile.sh :app:assembleDebug

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure scripts are executable
        run: chmod +x gradlew scripts/validate-compile.sh scripts/validate-unit-tests.sh

      - name: Run unit tests
        run: bash scripts/validate-unit-tests.sh

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/**
            app/build/test-results/testDebugUnitTest/**
          if-no-files-found: warn

  lint:
    name: Lint Debug
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure scripts are executable
        run: chmod +x gradlew scripts/validate-compile.sh scripts/validate-unit-tests.sh

      - name: Run lint
        run: ./gradlew :app:lintDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.*
          if-no-files-found: warn
